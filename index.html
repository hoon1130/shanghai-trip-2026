<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>상해 패밀리 투어 가이드 🇨🇳</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#de2910">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { 50: '#f8fafc', 500: '#de2910', 600: '#b91c1c', 900: '#0f172a' } } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; word-break: keep-all; user-select: none; letter-spacing: -0.03em; }
        .tab-content { display: none; } .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid #f1f5f9; }
        .dark .glass-header { background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid #1e293b; }
        .bottom-nav { height: 60px; border-top: 1px solid #f1f5f9; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .dark .bottom-nav { border-top: 1px solid #1e293b; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        input, select, textarea { font-size: 16px !important; border-radius: 12px !important; }
        .card-grad { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); }
        .dark .card-grad { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .category-chip { transition: all 0.2s; white-space: nowrap; border: 1px solid #e2e8f0; cursor: pointer; }
        .dark .category-chip { border-color: #1e293b; }
        .category-chip.active { background-color: #de2910; color: white; border-color: #de2910; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 pb-24 transition-colors duration-300 text-slate-900 dark:text-slate-100">

    <header class="glass-header sticky top-0 z-50 px-4 py-3">
        <div class="flex justify-between items-center">
            <div class="flex flex-col">
                <div class="flex space-x-3 text-[14px] font-bold font-mono tracking-tighter">
                    <span id="time-kr" class="text-slate-400 italic">KOR --:--</span>
                    <span id="time-sh" class="text-brand-500 font-black italic underline underline-offset-4 decoration-2">SHA --:--</span>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <button onclick="window.open('https://search.naver.com/search.naver?query=상해+날씨', '_blank')" id="weather-display" class="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-3 py-1.5 rounded-full text-xs font-black flex items-center shadow-sm border border-blue-100 dark:border-blue-800/50">
                    <i class="fas fa-spinner fa-spin mr-1"></i>--°C
                </button>
                <button onclick="location.href='alipays://platformapi/startapp?appId=20000056'" class="w-9 h-9 rounded-full bg-blue-500 text-white flex items-center justify-center shadow-md active:scale-90 transition-transform">
                    <i class="fab fa-alipay text-[16px]"></i>
                </button>
                <button onclick="toggleTheme()" class="w-9 h-9 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 shadow-sm border border-slate-200 dark:border-slate-700">
                    <i id="theme-icon" class="fas fa-moon text-sm"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="p-4">
        <div id="schedule" class="tab-content active space-y-5">
            <div id="sub-tabs" class="flex bg-slate-200/50 dark:bg-slate-800/50 p-1 rounded-2xl mb-4 shadow-inner border border-slate-100 dark:border-slate-800">
                <button onclick="toggleItineraryType('family')" id="btn-family" class="flex-1 py-3 rounded-xl text-[13px] font-black transition-all bg-white dark:bg-slate-700 shadow-sm text-brand-500">📍 실전 일정표</button>
                <button onclick="toggleItineraryType('guide')" id="btn-guide" class="flex-1 py-3 rounded-xl text-[13px] font-black transition-all text-slate-500 dark:text-slate-400">💎 가이드 브리핑</button>
            </div>
            <div id="family-itinerary" class="space-y-4">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-lg font-black uppercase tracking-tighter italic">Family Route</h2>
                    <button onclick="openItineraryForm()" class="bg-slate-900 dark:bg-brand-500 text-white px-4 py-2 rounded-lg text-[11px] font-black shadow-lg flex items-center active:scale-95 transition-transform"><i class="fas fa-plus mr-1"></i>일정 추가</button>
                </div>
                <div id="itinerary-list" class="space-y-6 pt-2"></div>
            </div>
            <div id="guide-itinerary" class="hidden space-y-4">
                <div id="guide-itinerary-list" class="space-y-6 pt-2"></div>
            </div>
        </div>

        <div id="spot" class="tab-content space-y-5">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-lg font-black uppercase tracking-tighter italic text-brand-500">Shanghai Spots</h2>
                <button onclick="openSpotModal()" class="bg-slate-900 dark:bg-brand-500 text-white px-4 py-2 rounded-lg text-[11px] font-black shadow-lg active:scale-95 transition-transform"><i class="fas fa-plus mr-1"></i>장소 추가</button>
            </div>
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="spot-search" oninput="renderSpots()" placeholder="장소 검색 (명칭, 주소...)" class="w-full p-4 pl-11 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 font-bold text-sm outline-none shadow-sm">
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide no-scrollbar">
                <button onclick="filterSpots('전체')" class="category-chip active px-5 py-2 rounded-full text-xs font-black shadow-sm" data-cat="전체">전체</button>
                <button onclick="filterSpots('핵심')" class="category-chip px-5 py-2 rounded-full text-xs font-black shadow-sm bg-white dark:bg-slate-900" data-cat="핵심">핵심</button>
                <button onclick="filterSpots('명소')" class="category-chip px-5 py-2 rounded-full text-xs font-black shadow-sm bg-white dark:bg-slate-900" data-cat="명소">명소</button>
                <button onclick="filterSpots('맛집')" class="category-chip px-5 py-2 rounded-full text-xs font-black shadow-sm bg-white dark:bg-slate-900" data-cat="맛집">맛집</button>
                <button onclick="filterSpots('쇼핑/기타')" class="category-chip px-5 py-2 rounded-full text-xs font-black shadow-sm bg-white dark:bg-slate-900" data-cat="쇼핑/기타">쇼핑/기타</button>
            </div>
            <div id="spot-list" class="space-y-4"></div>
        </div>

        <div id="ledger" class="tab-content space-y-5">
            <div class="bg-slate-900 text-white p-7 rounded-[2.5rem] shadow-xl relative overflow-hidden">
                <h2 class="text-4xl font-black mb-1 italic tracking-tighter" id="exchange-rate-display">1¥ = 215.94₩</h2>
                <div class="space-y-4 mt-8"><div class="relative"><span class="absolute left-5 top-5 text-white/50 font-black text-sm">CNY</span><input type="number" id="cny-input" placeholder="위안(¥) 입력" class="w-full p-5 pl-16 rounded-[1.5rem] bg-white/10 border border-white/10 text-white font-black outline-none text-2xl"></div><div class="relative"><span class="absolute left-5 top-5 text-white/50 font-black text-sm">KRW</span><input type="number" id="krw-input" placeholder="원화(₩) 입력" class="w-full p-5 pl-16 rounded-[1.5rem] bg-brand-500 border-none text-white font-black outline-none text-2xl placeholder:text-white/50"></div></div>
            </div>
            <div class="bg-white dark:bg-slate-900 p-6 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-md">
                <div class="flex gap-2 mb-6"><input type="text" id="exp-desc" placeholder="지출 내역" class="flex-1 p-4 rounded-xl border dark:bg-slate-800 dark:text-white dark:border-slate-700 font-bold text-sm outline-none"><input type="number" id="exp-amt" placeholder="¥" class="w-20 p-4 rounded-xl border dark:bg-slate-800 dark:text-white dark:border-slate-700 font-bold text-sm outline-none text-center"><button onclick="addExpense()" class="px-5 bg-slate-900 dark:bg-brand-500 text-white rounded-xl font-black text-sm active:scale-95 transition-transform">저장</button></div>
                <div id="expense-list" class="space-y-3"></div>
                <div class="mt-6 pt-5 border-t-2 border-dashed border-slate-100 dark:border-slate-800 flex justify-between items-center px-1"><span class="font-black text-slate-400 text-xs tracking-widest uppercase">Total Expense</span><span id="total-expense" class="text-3xl font-black text-brand-500 italic decoration-2">0 ¥</span></div>
            </div>
        </div>

        <div id="phrases" class="tab-content space-y-6">
            <div id="phrase-list" class="space-y-6 pb-8"></div>
        </div>

        <div id="packing" class="tab-content space-y-6">
            <div class="bg-white dark:bg-slate-900 p-7 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-sm">
                <div class="flex justify-between items-center mb-5"><h3 class="font-black text-base italic text-brand-500">체크리스트</h3><button onclick="openChecklistModal('packing')" class="bg-slate-900 dark:bg-brand-500 text-white px-3 py-1 rounded-lg text-[10px] font-black">추가</button></div>
                <div id="packing-list" class="space-y-2"></div>
            </div>
            <div class="bg-white dark:bg-slate-900 p-7 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-sm">
                <div class="flex justify-between items-center mb-5"><h3 class="font-black text-base italic text-purple-500">쇼핑 리스트</h3><button onclick="openChecklistModal('shopping')" class="bg-slate-900 dark:bg-purple-500 text-white px-3 py-1 rounded-lg text-[10px] font-black">추가</button></div>
                <div id="shopping-list" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-header flex bottom-nav z-50 shadow-2xl">
        <button onclick="showTab('schedule')" class="tab-btn flex-1 flex flex-col items-center justify-center text-brand-500"><i class="fas fa-route text-[22px] mb-1"></i><span class="text-[9px] font-black uppercase">Plan</span></button>
        <button onclick="showTab('spot')" class="tab-btn flex-1 flex flex-col items-center justify-center text-slate-400"><i class="fas fa-map-marked-alt text-[22px] mb-1"></i><span class="text-[9px] font-black uppercase">Spot</span></button>
        <button onclick="showTab('ledger')" class="tab-btn flex-1 flex flex-col items-center justify-center text-slate-400"><i class="fas fa-wallet text-[22px] mb-1"></i><span class="text-[9px] font-black uppercase">Money</span></button>
        <button onclick="showTab('phrases')" class="tab-btn flex-1 flex flex-col items-center justify-center text-slate-400"><i class="fas fa-comment-dots text-[22px] mb-1"></i><span class="text-[9px] font-black uppercase">Talk</span></button>
        <button onclick="showTab('packing')" class="tab-btn flex-1 flex flex-col items-center justify-center text-slate-400"><i class="fas fa-suitcase text-[22px] mb-1"></i><span class="text-[9px] font-black uppercase">Box</span></button>
    </nav>

    <div id="itinerary-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-5 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] w-full max-w-md space-y-5 shadow-2xl">
            <h3 class="font-black text-2xl border-b pb-3 text-brand-500 text-center uppercase italic">Edit Plan</h3>
            <input type="hidden" id="edit-key"><select id="form-date" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none font-black"><option value="05-05(화)">5월 5일 (화)</option><option value="05-06(수)">5월 6일 (수)</option><option value="05-07(목)">5월 7일 (목)</option><option value="05-08(금)">5월 8일 (금)</option><option value="05-09(토)">5월 9일 (토)</option></select>
            <input type="text" id="form-time" placeholder="시간 (예: 14:30~15:00)" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none font-black">
            <input type="text" id="form-place" placeholder="장소명" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none font-black">
            <textarea id="form-memo" placeholder="상세 내용" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none font-black h-32"></textarea>
            <div class="flex space-x-3 pt-2"><button onclick="saveItinerary()" class="flex-1 bg-slate-900 dark:bg-brand-500 text-white py-4 rounded-2xl font-black active:scale-95">SAVE</button><button onclick="closeItineraryModal()" class="flex-1 bg-slate-200 dark:bg-slate-700 py-4 rounded-2xl font-black active:scale-95">CLOSE</button></div>
            <button id="delete-btn" onclick="deleteItinerary()" class="w-full text-red-500 font-bold text-xs underline hidden mt-4">Delete Itinerary</button>
        </div>
    </div>

    <div id="spot-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-5 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] w-full max-w-md space-y-5 shadow-2xl">
            <h3 id="spot-modal-title" class="font-black text-2xl border-b pb-3 text-brand-500 text-center uppercase italic">Spot Info</h3>
            <input type="hidden" id="spot-key"><select id="spot-cat" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none font-black"><option value="핵심">핵심</option><option value="명소">명소</option><option value="맛집">맛집</option><option value="쇼핑/기타">쇼핑/기타</option></select>
            <input type="text" id="spot-name-ko" placeholder="한글 명칭" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none font-black"><input type="text" id="spot-name-zh" placeholder="중문 명칭" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none font-black"><input type="text" id="spot-addr" placeholder="상세 주소(중문)" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none font-black">
            <div class="flex space-x-3 pt-2"><button onclick="saveSpot()" class="flex-1 bg-slate-900 dark:bg-brand-500 text-white py-4 rounded-2xl font-black active:scale-95">저장</button><button onclick="closeSpotModal()" class="flex-1 bg-slate-200 dark:bg-slate-700 py-4 rounded-2xl font-black active:scale-95">닫기</button></div>
            <button id="spot-delete-btn" onclick="deleteSpot()" class="w-full text-red-500 font-bold text-xs underline hidden mt-4">장소 삭제</button>
        </div>
    </div>

    <div id="checklist-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-5 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] w-full max-w-md space-y-5 shadow-2xl">
            <h3 id="checklist-modal-title" class="font-black text-2xl border-b pb-3 text-brand-500 text-center uppercase italic">Item Info</h3>
            <input type="hidden" id="checklist-type"><input type="hidden" id="checklist-key"><input type="text" id="checklist-title" placeholder="항목 이름" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none font-black"><input type="text" id="checklist-memo" placeholder="메모" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none font-black">
            <div class="flex space-x-3 pt-2"><button onclick="saveChecklist()" class="flex-1 bg-slate-900 dark:bg-brand-500 text-white py-4 rounded-2xl font-black active:scale-95">저장</button><button onclick="closeChecklistModal()" class="flex-1 bg-slate-200 dark:bg-slate-700 py-4 rounded-2xl font-black active:scale-95">닫기</button></div>
            <button id="checklist-delete-btn" onclick="deleteChecklist()" class="w-full text-red-500 font-bold text-xs underline hidden mt-4">항목 삭제</button>
        </div>
    </div>

    <div id="tip-modal" class="fixed inset-0 bg-black/80 z-[200] hidden p-6 flex items-center justify-center backdrop-blur-md">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-[3rem] w-full max-w-md flex flex-col max-h-[80vh] shadow-2xl border-t-[10px] border-amber-400">
            <h3 class="font-black text-3xl mb-6 flex items-center text-brand-500 uppercase italic">Guide Point</h3>
            <div id="tip-content" class="overflow-y-auto text-[17px] text-slate-700 dark:text-slate-200 leading-relaxed font-bold break-keep"></div>
            <button onclick="closeTipModal()" class="w-full bg-slate-900 dark:bg-brand-500 text-white font-black py-5 rounded-2xl mt-8 active:scale-95 transition-transform">확인했습니다</button>
        </div>
    </div>

    <div id="flashcard" class="fixed inset-0 bg-yellow-400 z-[300] hidden flex flex-col items-center justify-center p-8 text-center cursor-pointer" onclick="this.classList.add('hidden')">
        <h2 id="flash-zh" class="text-6xl font-black text-slate-900 mb-8 leading-tight"></h2>
        <p id="flash-ko" class="text-3xl font-bold text-yellow-900 mb-2"></p>
        <p id="flash-py" class="text-2xl font-bold text-yellow-700 mb-10"></p>
    </div>

        function getSmartInfo(input) {
            if(!input) return {name: "", addr: ""};
            let destination = input;
            const arrowMatch = input.match(/(?:->|→)\s*([^(\n]+)/);
            if (arrowMatch) destination = arrowMatch[1].trim();
            const query = destination.toLowerCase().replace(/\s+/g, '');
            for (let key in smartMapDict) { if (query.includes(key)) return smartMapDict[key]; }
            return {name: destination, addr: ""};
        }
        function openAmap(place) {
            const info = getSmartInfo(place); navigator.clipboard.writeText(info.name).catch(()=>{});
            const keyword = encodeURIComponent(info.name); const ua = navigator.userAgent.toLowerCase();
            if (ua.indexOf("iphone") > -1) window.location.href = `iosamap://poi?sourceApplication=sh_trip&name=${keyword}`;
            else if (ua.indexOf("android") > -1) window.location.href = `androidamap://poi?sourceApplication=sh_trip&keywords=${keyword}`;
            else window.open(`https://uri.amap.com/search?keyword=${keyword}`, '_blank');
        }
        function openBaiduMap(place) {
            const info = getSmartInfo(place); navigator.clipboard.writeText(info.name).catch(()=>{});
            const url = `https://map.baidu.com/mobile/webapp/search/search/qt=s&wd=${encodeURIComponent(info.name)}`;
            const link = document.createElement('a'); link.href = url; link.target = '_blank'; link.rel = 'noopener noreferrer';
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
        function openDidi(place) {
            const info = getSmartInfo(place); navigator.clipboard.writeText(info.name).catch(()=>{});
            const encN = encodeURIComponent(info.name), encA = encodeURIComponent(info.addr);
            const appU = `OneTravel://route/?end_name=${encN}&end_address=${encA}`;
            const fallbackU = `diditaxi://route/?end_name=${encN}&end_address=${encA}`;
            const alipayU = `alipays://platformapi/startapp?appId=20000067&page=pages/index/index&query=end_name%3D${encN}%26end_address%3D${encA}`;
            const start = Date.now(); window.location.href = appU;
            setTimeout(() => { if (Date.now() - start < 1500) { window.location.href = fallbackU; setTimeout(() => { if (Date.now() - start < 3000) window.location.href = alipayU; }, 1500); } }, 1000);
        }

        function saveChecklist() { const k = document.getElementById('checklist-key').value, t = document.getElementById('checklist-type').value, title = document.getElementById('checklist-title').value, memo = document.getElementById('checklist-memo').value; if(!title) return; if(k) db.ref(`${basePath}/checklist/${k}`).update({title, memo}); else db.ref(`${basePath}/checklist`).push({title, memo, type: t, checked: false}); closeChecklistModal(); }
        function deleteChecklist() { const k = document.getElementById('checklist-key').value; if(k && confirm("삭제?")) { db.ref(`${basePath}/checklist/${k}`).remove(); closeChecklistModal(); } }
        function loadChecklist() { if(db) db.ref(`${basePath}/checklist`).on('value', s => { const data = s.val() || {}; const items = Object.entries(data).map(([k, v]) => ({...v, key: k})); if(items.length === 0) { [...initialChecklist, ...initialShopping].forEach(i => db.ref(`${basePath}/checklist`).push(i)); return; } const packEl = document.getElementById('packing-list'), shopEl = document.getElementById('shopping-list'); if(packEl) packEl.innerHTML = items.filter(i => i.type === 'packing').map(i => `<div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800 rounded-xl mb-2"><div onclick="openChecklistModal('packing', '${i.key}')" class="flex-1"><p class="font-bold text-sm">${i.title}</p>${i.memo ? `<p class="text-[10px] text-slate-400">${i.memo}</p>` : ''}</div><input type="checkbox" ${i.checked ? 'checked' : ''} onchange="db.ref('${basePath}/checklist/${i.key}').update({checked: this.checked})" class="w-5 h-5 accent-brand-500"></div>`).join(''); if(shopEl) shopEl.innerHTML = items.filter(i => i.type === 'shopping').map(i => `<div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl mb-2"><div onclick="openChecklistModal('shopping', '${i.key}')" class="flex-1"><p class="font-black text-sm">${i.title}</p>${i.memo ? `<p class="text-[11px] text-slate-500 mt-1">${i.memo}</p>` : ''}</div><input type="checkbox" ${i.checked ? 'checked' : ''} onchange="db.ref('${basePath}/checklist/${i.key}').update({checked: this.checked})" class="w-5 h-5 accent-purple-500"></div>`).join(''); }); }
        function openItineraryForm(key = null) { document.getElementById('itinerary-modal').classList.remove('hidden'); if(key) { const item = itineraryData.find(i => i.key === key); if(item) { document.getElementById('edit-key').value = key; document.getElementById('form-date').value = item.date; document.getElementById('form-time').value = item.time; document.getElementById('form-place').value = item.place; document.getElementById('form-memo').value = item.memo || ""; document.getElementById('delete-btn').classList.remove('hidden'); } } else { document.getElementById('edit-key').value = ''; document.getElementById('itinerary-modal').querySelectorAll('input, textarea').forEach(i => i.value = ''); document.getElementById('delete-btn').classList.add('hidden'); } }
        function closeItineraryModal() { document.getElementById('itinerary-modal').classList.add('hidden'); }
        function saveItinerary() { const k = document.getElementById('edit-key').value, d = { date: document.getElementById('form-date').value, time: document.getElementById('form-time').value || "00:00", place: document.getElementById('form-place').value || "장소명", memo: document.getElementById('form-memo').value || "" }; if(k) db.ref(`${basePath}/itinerary/${k}`).update(d); else db.ref(`${basePath}/itinerary`).push(d); closeItineraryModal(); }
        function deleteItinerary() { const k = document.getElementById('edit-key').value; if(k && confirm("삭제할까요?")) { db.ref(`${basePath}/itinerary/${k}`).remove(); closeItineraryModal(); } }
        function loadItinerary() { if (db) db.ref(`${basePath}/itinerary`).on('value', s => { const data = s.val(); if(data) { itineraryData = Object.entries(data).map(([k, v]) => ({...v, key: k})); itineraryData.sort((a, b) => (a.date ? a.date.replace(/[^0-9]/g, "") : "").localeCompare(b.date ? b.date.replace(/[^0-9]/g, "") : "") || (a.time || "").localeCompare(b.time || "")); renderList(itineraryData); scrollToCurrentTask(); } else initialShanghai.forEach(i => db.ref(`${basePath}/itinerary`).push(i)); }); }
        function scrollToCurrentTask() { try { const now = new Date(); const shTime = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Shanghai"})); const todayStr = `${(shTime.getMonth() + 1).toString().padStart(2, '0')}-${shTime.getDate().toString().padStart(2, '0')}`; const curM = shTime.getHours() * 60 + shTime.getMinutes(); let targetId = null; let minD = Infinity; itineraryData.forEach(item => { if (item.date && item.date.includes(todayStr) && item.time) { const timeArr = item.time.split('~'); if(timeArr.length > 0) { const [h, m] = timeArr[0].split(':').map(Number); if(!isNaN(h)) { const diff = (h * 60 + m) - curM; if (diff >= -60 && diff < minD) { minD = diff; targetId = `card-${item.key}`; } } } } }); if (targetId) { const el = document.getElementById(targetId); if (el) setTimeout(() => { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.parentElement.classList.add('ring-2', 'ring-brand-500', 'rounded-[2.5rem]', 'p-1'); }, 500); } } catch(e) {} }

        try { firebase.initializeApp({ databaseURL: "https://nhatrang-trip-default-rtdb.asia-southeast1.firebasedatabase.app" }); db = firebase.database(); } catch (e) { console.error(e); }

        document.addEventListener('DOMContentLoaded', () => {
            const cny = document.getElementById('cny-input'), krw = document.getElementById('krw-input');
            if(cny && krw) {
                cny.addEventListener('input', (e) => krw.value = e.target.value ? Math.round(e.target.value * exchangeRate) : '');
                krw.addEventListener('input', (e) => cny.value = e.target.value ? (e.target.value / exchangeRate).toFixed(2) : '');
            }
            const exEl = document.getElementById('exchange-rate-display'); if(exEl) exEl.innerText = `1¥ = ${exchangeRate}₩`;
            startClock(); fetchWeather(); renderPhrases(); loadItinerary(); loadExpenses(); loadChecklist(); loadSpots();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    reg.onupdatefound = () => { const iw = reg.installing; iw.onstatechange = () => { if (iw.state === 'installed' && navigator.serviceWorker.controller) console.log('New content available.'); }; };
                }).catch(()=>{});
                let ref; navigator.serviceWorker.addEventListener('controllerchange', () => { if (ref) return; window.location.reload(); ref = true; });
            }
        });
    </script>
</body>
